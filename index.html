<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kruh otevřené rodiny</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#ddb64a;
    --brown:#4b2d20;
    --cream:#f8f3e8;
    --container:1400px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
    background:#fff;
}

/* ===================================
   CONTAINER
=================================== */

.container{
    width:min(92%, var(--container));
    margin:auto;
}

/* ===================================
   HEADER
=================================== */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    transition:.3s;
}

header.scrolled{
    background:rgba(248,243,232,.95);
    backdrop-filter:blur(10px);
    box-shadow:0 2px 20px rgba(0,0,0,.04);
}

.navbar{
    min-height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.logo{
    position:absolute;
    left:0;
}

.logo img{
    width:190px;
    height:auto;
    display:block;
}

.menu{
    list-style:none;
    display:flex;
    gap:28px;
}

.menu a{
    color:#000;
    text-decoration:none;
    font-size:15px;
    font-weight:500;
    letter-spacing:.3px;
    transition:.25s;
}

.cta{
    background:#efd16f;
    color:var(--brown);
    text-decoration:none;
    padding:15px 30px;
    border-radius:999px;
    font-size:15px;
    transition:.25s;
    position:absolute;
    right:0;
}

.cta:hover{
    transform:translateY(-2px);
}

/* ===================================
   HERO
=================================== */

.hero{
    background:var(--cream);
    position:relative;
    line-height:0;
}

.hero img{
    width:100%;
    display:block;
}


/* ===================================
   SECTIONS
=================================== */

.section{
    min-height:900px;
    background:#fff;
}

/* ===================================
   FOOTER
=================================== */

footer{
    padding:60px 0;
    text-align:center;
    border-top:1px solid #eee;
}

footer img{
    height:70px;
    margin:auto auto 20px;
}

footer p{
    color:#888;
    font-size:14px;
}

/* ===================================
   MOBILE
=================================== */

.hamburger{
    display:none;
    flex-direction:column;
    gap:6px;
    cursor:pointer;
    position:absolute;
    right:0;
}

.hamburger span{
    width:28px;
    height:3px;
    background:var(--brown);
    border-radius:10px;
}

.mobile-menu{
    position:fixed;
    top:0;
    right:-100%;
    width:300px;
    height:100vh;
    background:white;
    transition:.3s;
    z-index:1100;
    padding:120px 35px;
}

.mobile-menu.active{
    right:0;
}

.mobile-menu a{
    display:block;
    margin-bottom:22px;
    text-decoration:none;
    color:var(--brown);
    font-size:18px;
}

@media(max-width:768px){

    .menu,
    .cta{
        display:none;
    }

    .hamburger{
        display:flex;
    }

    .navbar{
        min-height:95px;
    }

    .logo img{
        height:70px;
    }

}

</style>
</head>
<body>

<header id="header">

    <div class="container">

        <nav class="navbar">

            <a href="#" class="logo">
                <img src="logo1.png" alt="Kruh otevřené rodiny">
            </a>

            <ul class="menu">
                <li><a href="#about">O mně</a></li>
                <li><a href="#services">Semináře</a></li>
                <li><a href="#blog">Kurzy</a></li>
                <li><a href="#events">Pro maminky a pečující</a></li>
                <li><a href="#events">Propojení rodičů</a></li>
                <li><a href="#contact">Kontakt</a></li>
            </ul>

<a href="#contact" class="cta">
    Pojďme se spojit
</a>

            
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

        </nav>

    </div>

</header>

<div class="mobile-menu" id="mobileMenu">

    <a href="#about">O mně</a>
    <a href="#services">Co nabízím</a>
    <a href="#blog">Blog</a>
    <a href="#events">Akce a setkání</a>
    <a href="#contact">Kontakt</a>

</div>

<section class="hero">

    <img src="hero.png" alt="Kruh otevřené rodiny">

</section>

<section id="about" class="section"></section>

<section id="services" class="section"></section>

<section id="blog" class="section"></section>

<section id="events" class="section"></section>

<section id="contact" class="section"></section>

<footer>

    <img src="logo1.png" alt="Logo">

    <p>
        © 2026 Kruh otevřené rodiny. Všechna práva vyhrazena.
    </p>

</footer>

<script>

const header = document.getElementById('header');

window.addEventListener('scroll', () => {

    if(window.scrollY > 30){
        header.classList.add('scrolled');
    }else{
        header.classList.remove('scrolled');
    }

});

const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('active');
});

document.querySelectorAll('.mobile-menu a').forEach(link => {

    link.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
    });

});

</script>

</body>
</html>
